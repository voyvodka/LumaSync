# Set macOS deployment target to 12.3 — the minimum for ScreenCaptureKit.
#
# Why this matters (root cause of the 1.5.2 launch crash, issue #115):
# The Swift SDK's TBD stub for libswift_Concurrency.dylib carries a
# `$ld$previous` linker directive. When the binary is linked with a
# deployment target < 12.0, that directive rewrites the dylib's install
# name to `@rpath/libswift_Concurrency.dylib` (a back-deployment shim).
# At launch, dyld then has to resolve that `@rpath` against the build
# machine's Xcode Swift 5.5 toolchain path — which does not exist on a
# normal user's machine — so dyld aborts with "Library not loaded"
# before main() ever runs. With a deployment target >= 12.0 the linker
# instead bakes the absolute system install name
# (/usr/lib/swift/libswift_Concurrency.dylib), present on every macOS 12+,
# and the binary loads cleanly.
#
# `force = true` is deliberate. Tauri's bundler sets MACOSX_DEPLOYMENT_TARGET
# from `bundle.macOS.minimumSystemVersion` (default 10.13 when unset) as a
# real process env var during `tauri build`. A non-forced Cargo `[env]` entry
# only applies when the variable is UNSET, so that bundler-injected 10.13
# would silently win and reintroduce the crash. `force = true` makes Cargo's
# 12.3 authoritative regardless of any pre-set value. This is also pinned in
# tauri.conf.json (minimumSystemVersion) and as a workflow-level env var in
# CI/release so the floor holds in every build context.
[env]
MACOSX_DEPLOYMENT_TARGET = { value = "12.3", force = true }
