name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

# Cancel superseded runs when a branch is force-pushed or pushed multiple
# times in quick succession. Saves ~15-20 minutes of duplicate Rust matrix
# work per redundant push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build and Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Select Xcode 26 (macOS 26 SDK for screencapturekit 8 / apple-metal)
        if: runner.os == 'macOS'
        run: |
          # screencapturekit 8 pulls apple-metal 0.8.8, whose Swift bridge
          # references Metal 4 sampler APIs guarded by `if #available(macOS
          # 26.0, *)`. Swift still needs those symbols defined at COMPILE time,
          # i.e. the macOS 26 SDK. The macos-15 runner ships Xcode 26.x but
          # defaults to Xcode 16.4 (no macOS 26 SDK), so select the newest
          # installed Xcode explicitly. The availability guard keeps the built
          # binary runnable on older macOS.
          latest=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then latest=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1); fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version
          echo "macOS SDK: $(xcrun --sdk macosx --show-sdk-version)"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # v1.6: busted to force a cold rebuild of the upgraded Rust deps
          # (screencapturekit 8 / keyring 4 / tauri 2.11.3) under Xcode 26.
          prefix-key: v1.6-rust-cache
          shared-key: ${{ matrix.os }}

      - name: Install Linux deps for Tauri + xcap (X11 capture)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxrandr-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libgbm-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check and shell contracts (Linux only)
        if: runner.os == 'Linux'
        run: pnpm check:all

      - name: Run frontend tests (Linux only)
        if: runner.os == 'Linux'
        run: pnpm vitest run

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust check (all targets, all features)
        working-directory: src-tauri
        run: cargo check --all-targets --all-features

      - name: Rust tests
        working-directory: src-tauri
        # --test-threads=1 is required: lighting_mode tests share a global
        # ACTIVE_AMBILIGHT_WORKERS AtomicUsize; parallel test execution causes
        # spurious failures when other tests' workers bleed into the count.
        run: cargo test --all-features -- --test-threads=1

      - name: Rust audit (Linux only)
        if: runner.os == 'Linux'
        working-directory: src-tauri
        run: |
          cargo install --locked cargo-audit
          cargo audit
