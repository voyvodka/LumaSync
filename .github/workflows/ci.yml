name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Build and Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1.4-rust-cache
          shared-key: ${{ matrix.os }}

      - name: Install Linux deps for Tauri + xcap (X11 capture)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxrandr-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libgbm-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check and shell contracts (Linux only)
        if: runner.os == 'Linux'
        run: pnpm check:all

      - name: Run frontend tests (Linux only)
        if: runner.os == 'Linux'
        run: pnpm vitest run

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust check (all targets, all features)
        working-directory: src-tauri
        run: cargo check --all-targets --all-features

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Rust audit (Linux only)
        if: runner.os == 'Linux'
        working-directory: src-tauri
        run: |
          cargo install --locked cargo-audit || true
          cargo audit
