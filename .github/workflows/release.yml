name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps for Tauri bundle + xcap (X11 capture)
        if: matrix.os == 'ubuntu-24.04'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxrandr-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libgbm-dev

      - name: Install macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Rust check (cargo check)
        run: pnpm check:rust

      - name: Rust format check (cargo fmt)
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust lint (cargo clippy -D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Rust unit tests (cargo test)
        run: cargo test --lib --no-fail-fast -- --test-threads=1
        working-directory: src-tauri

      - name: Verify shell contracts
        run: pnpm verify:shell-contracts

      - name: Run frontend tests
        run: pnpm vitest run

      - name: Detect release channel from tag
        id: channel
        shell: bash
        run: |
          # v1.5 W2-C6 — derive the release channel from the tag suffix so
          # `vX.Y.Z` lands as a stable GitHub Release while `vX.Y.Z-beta.N`,
          # `vX.Y.Z-rc.N`, etc. land flagged as prerelease. Tauri updater on
          # the user side keeps reading `latest.json` (stable) until a
          # follow-up Rust-side dynamic-endpoint commit teaches it to fan
          # out to `latest-beta.json` for opted-in installs.
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(awk "/^## \[${VERSION}\]/{p=1; next} /^## \[/{if(p) exit} /^---$/{if(p) exit} p" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LumaSync ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          args: ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}
